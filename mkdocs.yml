site_name: 爱尔兰《道路规则》中文版
site_description: 爱尔兰道路安全管理局《道路规则》的简体中文 Markdown 版本
site_url: https://faryao.github.io/irish-driver-rules-zh/
repo_url: https://github.com/faryao/irish-driver-rules-zh
repo_name: faryao/irish-driver-rules-zh
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - content.action.edit
    - navigation.sections
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang: zh
  - exclude:
      glob:
        - extraction-report.md
        - source.md
        - README.md

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  goatcounter_endpoint: !ENV [GOATCOUNTER_ENDPOINT, ""]

nav:
  - 首页: index.md
  - 前言: 00-foreword.md
  - 引言: 01-introduction.md
  - 正文:
      - 第 1 节：驾驶执照与车辆类别: 02-section-01-driving-licences.md
      - 第 2 节：学习驾驶人: 03-section-02-learner-driver.md
      - 第 3 节：驾驶考试: 04-section-03-driving-test.md
      - 第 4 节：车辆安全: 05-section-04-vehicle-safety.md
      - 第 5 节：良好驾驶做法: 06-section-05-good-driving-practice.md
      - 第 6 节：交通标志与道路标线: 07-section-06-signs-markings.md
      - 第 7 节：交通灯与信号: 08-section-07-traffic-lights-signals.md
      - 第 8 节：速度限制: 09-section-08-speed-limits.md
      - 第 9 节：交叉路口与环形交叉路口: 10-section-09-junctions-roundabouts.md
      - 第 10 节：停车: 11-section-10-parking.md
      - 第 11 节：高速公路与隧道: 12-section-11-motorways-tunnels.md
      - 第 12 节：配合爱尔兰警察: 13-section-12-assisting-gardai.md
      - 第 13 节：影响安全驾驶的因素: 14-section-13-factors-safe-driving.md
      - 第 14 节：事故现场的正确行为: 15-section-14-incident-scene.md
      - 第 15 节：罚分、定额罚款与驾驶禁令: 16-section-15-penalty-points.md
      - 第 16 节：摩托车骑手规则: 17-section-16-motorcyclists.md
      - 第 17 节：自行车、电动滑板车及 L1e-A 电动轻便摩托车规则: 18-section-17-cyclists-escooters.md
      - 第 18 节：行人规则: 19-section-18-pedestrians.md
      - 第 19 节：尊重其他道路使用者: 20-section-19-respecting-road-users.md
      - 第 20 节：其他道路使用者: 21-section-20-other-road-users.md
      - 第 21 节：管制交通标志: 22-section-21-regulatory-signs.md
      - 第 22 节：警告交通标志: 23-section-22-warning-signs.md
      - 第 23 节：道路施工警告标志: 24-section-23-roadworks-signs.md
      - 第 24 节：信息标志: 25-section-24-information-signs.md
      - 第 25 节：高速公路标志: 26-section-25-motorway-signs.md
  - 附录:
      - 附录 1：需要医疗报告的病症: 27-appendix-01-medical-reports.md
      - 附录 2：道路交通与安全法律: 28-appendix-02-road-traffic-laws.md
      - 附录 3：实用网站: 29-appendix-03-useful-websites.md
      - 附录 4：罚分和定额罚款违法行为: 30-appendix-04-penalties.md
      - 附录 5：驾驶考试代表性车辆: 31-appendix-05-test-vehicles.md
  - 术语表: 33-glossary.md
  - 主题索引: 34-index.md
